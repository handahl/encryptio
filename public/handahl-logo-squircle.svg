<svg width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="handahlSquircleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066cc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003d7a;stop-opacity:1" />
    </linearGradient>
    <filter id="squircleShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Squircle background using path -->
  <path d="M40,2 C60,2 78,20 78,40 C78,60 60,78 40,78 C20,78 2,60 2,40 C2,20 20,2 40,2 Z" 
        fill="url(#handahlSquircleGradient)" filter="url(#squircleShadow)"/>
  
  <!-- Letter H -->
  <g fill="white">
    <!-- Left vertical bar -->
    <rect x="20" y="20" width="4" height="40" rx="2"/>
    <!-- Right vertical bar -->
    <rect x="56" y="20" width="4" height="40" rx="2"/>
    <!-- Horizontal crossbar -->
    <rect x="24" y="38" width="32" height="4" rx="2"/>
  </g>
  
  <!-- Accent dot -->
  <circle cx="65" cy="25" r="3" fill="#00ff88" opacity="0.8"/>
</svg>